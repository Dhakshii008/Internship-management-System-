<!DOCTYPE html>
<html lang="en">
<head>

    <style>

            background: linear-gradient(to right, #43cea2, #185a9d);
            color: white;
            text-align: center;
        }

        header {
            background: rgba(0,0,0,0.6);
            padding: 15px;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-size: 18px;
        }

        nav a:hover {
            color: yellow;
        }

        .container {
            padding: 50px;
        }

        input, textarea {
            width: 60%;
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 5px;
        }

        .btn {
            background: yellow;
            color: black;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: orange;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.6);
            padding: 10px;
        }

</head>

<body>

<header>
    <h1>Contact Us</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="services.html">Services</a>
    </nav>
</header>

<div class="container">
    <h2>Get in Touch</h2>

    <input type="text" placeholder="Enter your name"><br>
    <input type="email" placeholder="Enter your email"><br>
    <textarea placeholder="Your message"></textarea><br>

    <button class="btn" onclick="alert('Message Sent Successfully!')">
    Send
</button>
</div>

<footer>

</footer>
