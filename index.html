<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
        }

        header {
            background: rgba(0,0,0,0.6);
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        nav a:hover {
            color: yellow;
            font-size: 20px;
        }

        .container {
            text-align: center;
            padding: 80px;
        }

        .btn {
            background: yellow;
            color: black;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn:hover {
            background: orange;
            transform: scale(1.1);
        }

        footer {
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.6);
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    <h1>My Website</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="services.html">Services</a>
    </nav>
</header>

<div class="container">
    <h2>Welcome to My Website 🚀</h2>
    <p>This is my first website.</p>

    <button class="btn" onclick="window.location.href='about.html'">
        Go to About Page
    </button>
</div>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
