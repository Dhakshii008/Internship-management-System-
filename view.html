<!DOCTYPE html>
<html>
<head>
  <title>View Internships</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins';
      margin: 0;
      background: linear-gradient(120deg, #84fab0, #8fd3f4);
      text-align: center;
    }

    nav {
      background: linear-gradient(to right, #ff512f, #dd2476);
      padding: 15px;
    }

    nav a {
      color: white;
      margin: 20px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      width: 70%;
      margin: auto;
      margin-top: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px;
      border-radius: 15px;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      color: #ff512f;
    }

    .delete-btn {
      margin-top: 10px;
      padding: 8px 15px;
      border: none;
      background: red;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<nav>
  <a href="/">Home</a>
  <a href="/add.html">Add</a>
  <a href="/view.html">View</a>
</nav>

<div class="container">
  <h2>Available Internships</h2>
  <div id="list"></div>
</div>

<script>
function loadData() {
  fetch("/internships")
  .then(res => res.json())
  .then(data => {

    let list = document.getElementById("list");
    list.innerHTML = "";

    if(data.length === 0){
      list.innerHTML = "<p>No internships available</p>";
      return;
    }

    data.forEach(i => {
      let div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="title">${i.title}</div>
        <p>Stipend: ₹${i.stipend}</p>
        <button class="delete-btn" onclick="deleteIntern('${i._id}')">Delete</button>
      `;

      list.appendChild(div);
    });
  });
}

function deleteIntern(id){
  fetch(`/internships/${id}`, {
    method: "DELETE"
  })
  .then(() => {
    alert("Deleted");
    loadData();
  });
}

loadData();
</script>

</body>
</html>
